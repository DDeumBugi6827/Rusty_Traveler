<style>
    @keyframes flicker {
      0% { opacity: 0.8; }
      5% { opacity: 0.9; }
      10% { opacity: 0.7; }
      15% { opacity: 1; }
      20% { opacity: 0.8; }
      100% { opacity: 0.9; }
    }
    .crt-flicker {
      animation: flicker 0.15s infinite;
    }
    .grain-overlay {
      background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
      opacity: 0.05;
      pointer-events: none;
    }
    .weathered-border {
      box-shadow: inset 0 0 0 1px rgba(161, 140, 133, 0.2);
      clip-path: polygon(2% 0, 98% 0, 100% 2%, 100% 98%, 98% 100%, 2% 100%, 0 98%, 0 2%);
    }
    .scanline {
      width: 100%;
      height: 2px;
      background: rgba(180, 194, 133, 0.05);
      position: absolute;
      animation: scanline 10s linear infinite;
    }
    @keyframes scanline {
      0% { top: 0; }
      100% { top: 100%; }
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;

<!-- Main Content Canvas -->

<p class="font-label-sm text-label-sm text-on-surface-variant tracking-[0.15em] uppercase opacity-60 max-w-[280px]">
        Even if we run into each other by chance
      </p>
</div>
<!-- Interaction Hub -->
<div class="flex flex-col items-center gap-6 w-full max-w-xs">
<button onclick="window.location.href='/game.html'" class="group relative w-full py-6 bg-surface-container-high border-b-4 border-primary transition-all duration-300 hover:bg-primary hover:text-on-primary active:translate-y-1 active:border-b-0 weathered-border">
<span class="relative z-10 font-ui-button text-headline-lg-mobile tracking-widest uppercase">
          PLAY GAME
        </span>
<div class="absolute inset-0 bg-primary opacity-0 group-hover:opacity-10 transition-opacity"></div>
</button>

<!-- Micro-interactions Script -->
<script>
    document.addEventListener('mousemove', (e) => {
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      
      const bg = document.querySelector('.fixed.inset-0');
      if(bg) {
        bg.style.transform = `translate(${(x - 0.5) * 10}px, ${(y - 0.5) * 10}px)`;
      }
    });

    const playBtn = document.querySelector('button');
    playBtn.addEventListener('mouseenter', () => {
      console.log('Static hum intensified...');
    });
  </script>
